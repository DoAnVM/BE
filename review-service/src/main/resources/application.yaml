spring:
  application:
    name: "review-service"

  datasource:
    # url: ${DB_URL:jdbc:postgresql://14.162.146.23:5432/review_service}
    # username: ${DB_USERNAME:root}
    # password: ${DB_PASSWORD:root@2025}

    url: ${DB_URL:jdbc:postgresql://34.142.184.250:5432/review_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:18052004}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    openfeign:
      client:
        config:
          user-service:
            url: ${USER_SERVICE_URL:http://localhost:8081}
          hotel-service:
            url: ${HOTEL_SERVICE_URL:http://localhost:8083}

server:
  port: ${PORT:${SERVER_PORT:8085}}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
